name: Daily Power Brief

on:
  schedule:
    # 每天北京时间 8:00 运行 (UTC 0:00)
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: '跳过抓取，使用已有数据'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 lxml

      - name: Create data directory
        run: mkdir -p data

      - name: Run brief generator
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.skip_fetch }}" == "true" ]; then
            python src/main.py --skip-fetch
          else
            python src/main.py
          fi

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-data-${{ github.run_id }}
          path: |
            data/raw_items.json
            data/summarized_items.json
            data/history.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit history
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f data/history.json
          git diff --cached --quiet || git commit -m "Update history $(date +%Y-%m-%d)"
          git push || true
